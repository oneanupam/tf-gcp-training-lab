# This workflow is responsible for provisioning the infrastructure using Terraform.
name: GitOps Workflow

on:
  workflow_dispatch:
    inputs:
      working-dir:
        description: "the sub-project working directory"
        required: true

# Define environment variables for Terraform and Google Cloud SDK versions
env:
  TERRAFORM_VER: 1.14.0
  CLOUDSDK_VER: 522.0.0

# Define the permissions required for this workflow to run.
# This includes read access to repository contents, write access to ID tokens for authentication, and write access to pull requests.
permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  # Build and Deploy Job
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository code
      - name: Code checkout
        uses: actions/checkout@v4

      # Static code analysis using aqua security's tfsec
      - name: Run tfsec scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ github.event.inputs.working-dir }}
          additional_args: --minimum-severity HIGH

      # Setup the authentication for the Google Cloud using WIF
      - name: Authenticate to GCP
        uses: "google-github-actions/auth@v3"
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }} # Using repository level variable for project id
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER_ID }} # Using repository secret for workload identity provider id

      - name: Terraform Installation
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VER }}

      - name: Terraform fmt
        run: terraform fmt -check
        working-directory: ${{ github.event.inputs.working-dir }}

      - name: Terraform Plan
        run: |
          terraform init
          terraform validate -no-color
          terraform plan -no-color
        working-directory: ${{ github.event.inputs.working-dir }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/master'
        run: terraform apply -auto-approve
        working-directory: ${{ github.event.inputs.working-dir }}

      - name: Notify success
        if: success() # this step runs only if the previous steps succeeded.
        run: echo "[SUCCESS] The build is successful without any errors."

      - name: Notify failure
        if: failure() # this step runs only if any of the previous steps failed.
        run: |
          echo "[FAILED] This job has been failed due to earlier errors."
          echo "An eamil notification can be setup later sometime."
